<html lang="es">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moderation Dashboard 2025</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0f11;
  --surface: #16181c;
  --surface2: #1e2026;
  --border: #2a2d35;
  --border2: #363a44;
  --text: #e8eaf0;
  --muted: #7a7f8e;
  --accent: #4f8ef7;
  --accent2: #7c6af5;
  --green: #3dd68c;
  --amber: #f5a623;
  --red: #f04a4a;
  --pink: #e8529a;
  --teal: #2ec4b6;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 13px; line-height: 1.5; min-height: 100vh; }

/* LAYOUT */
.shell { display: flex; flex-direction: column; min-height: 100vh; }
header { padding: 20px 28px 0; border-bottom: 1px solid var(--border); }
.header-top { display: flex; align-items: baseline; gap: 16px; margin-bottom: 16px; }
.header-top h1 { font-size: 15px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; color: var(--text); }
.header-top .sub { font-size: 12px; color: var(--muted); font-family: var(--mono); }
.tabs { display: flex; gap: 2px; }
.tab { padding: 9px 20px; font-size: 12px; font-weight: 500; letter-spacing: .05em; text-transform: uppercase; cursor: pointer; border-top-left-radius: 4px; border-top-right-radius: 4px; color: var(--muted); background: transparent; border: none; border-bottom: 2px solid transparent; transition: all .15s; font-family: var(--sans); }
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.main { flex: 1; padding: 24px 28px; }
.page { display: none; }
.page.active { display: block; }

/* COMING SOON */
.coming { display: flex; align-items: center; justify-content: center; height: 300px; color: var(--muted); font-family: var(--mono); font-size: 13px; gap: 10px; }
.coming::before { content: '//'; color: var(--border2); }

/* SECTION */
.section-title { font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* GRID LAYOUTS */
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 24px; }
.grid4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 24px; }
@media(max-width:900px){ .grid4{grid-template-columns:repeat(2,1fr);} .grid2,.grid3{grid-template-columns:1fr;} }

/* METRIC CARD */
.metric { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 14px 16px; }
.metric .label { font-size: 10px; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
.metric .value { font-size: 26px; font-weight: 600; font-family: var(--mono); line-height: 1; }
.metric .sub { font-size: 11px; color: var(--muted); margin-top: 4px; font-family: var(--mono); }

/* PANEL */
.panel { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 16px; }
.panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.panel-title { font-size: 11px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); }

/* RANKING */
.rank-item { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--border); }
.rank-item:last-child { border-bottom: none; }
.rank-n { font-family: var(--mono); font-size: 11px; color: var(--muted); width: 18px; text-align: right; flex-shrink: 0; }
.rank-name { flex: 1; font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rank-bar-wrap { width: 100px; height: 4px; background: var(--border); border-radius: 2px; flex-shrink: 0; }
.rank-bar { height: 4px; border-radius: 2px; background: var(--accent); }
.rank-val { font-family: var(--mono); font-size: 11px; color: var(--text); width: 52px; text-align: right; flex-shrink: 0; }

/* MOTIVOS DONUT */
.motivo-row { display: flex; align-items: center; gap: 10px; padding: 5px 0; border-bottom: 1px solid var(--border); }
.motivo-row:last-child { border-bottom: none; }
.motivo-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
.motivo-name { flex: 1; font-size: 12px; }
.motivo-pct { font-family: var(--mono); font-size: 11px; color: var(--muted); width: 40px; text-align: right; }
.motivo-val { font-family: var(--mono); font-size: 11px; color: var(--text); width: 58px; text-align: right; }

/* MONTH HEATMAP */
.heatmap { width: 100%; border-collapse: collapse; font-size: 11px; }
.heatmap th { padding: 6px 8px; font-weight: 500; letter-spacing: .05em; text-transform: uppercase; color: var(--muted); text-align: right; font-size: 10px; white-space: nowrap; position: sticky; top: 0; background: var(--surface); }
.heatmap th:first-child { text-align: left; }
.heatmap td { padding: 5px 8px; text-align: right; font-family: var(--mono); font-size: 11px; white-space: nowrap; }
.heatmap td:first-child { text-align: left; font-family: var(--sans); font-weight: 500; font-size: 12px; padding-left: 4px; }
.heatmap tr:hover td { background: rgba(255,255,255,.03); }
.heatmap tfoot td { font-weight: 600; border-top: 1px solid var(--border2); color: var(--text); padding-top: 8px; }
.dash-cell { color: var(--border2); }
.cell-0 { color: var(--border2); }

/* COMMENTS TABLE */
.comments-table { width: 100%; border-collapse: collapse; }
.comments-table th { font-size: 10px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--muted); padding: 6px 10px; text-align: left; border-bottom: 1px solid var(--border2); }
.comments-table th:last-child,.comments-table td:last-child { text-align: right; }
.comments-table td { padding: 5px 10px; border-bottom: 1px solid var(--border); font-size: 12px; }
.comments-table tr:hover td { background: rgba(255,255,255,.02); }
.tag { display: inline-block; padding: 1px 7px; border-radius: 3px; font-size: 10px; font-weight: 500; letter-spacing: .04em; text-transform: uppercase; }

/* COMPARADOR */
.select-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
select { background: var(--surface2); color: var(--text); border: 1px solid var(--border2); border-radius: 4px; padding: 6px 10px; font-size: 12px; font-family: var(--sans); cursor: pointer; }
select:focus { outline: none; border-color: var(--accent); }
label { font-size: 11px; color: var(--muted); }
.comp-bars { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
.comp-bar-row { display: flex; align-items: center; gap: 10px; }
.comp-bar-name { width: 130px; font-size: 12px; font-weight: 500; text-align: right; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.comp-bar-track { flex: 1; height: 18px; background: var(--surface2); border-radius: 3px; position: relative; overflow: hidden; }
.comp-bar-fill { height: 100%; border-radius: 3px; display: flex; align-items: center; padding-left: 6px; font-family: var(--mono); font-size: 10px; color: rgba(255,255,255,.8); transition: width .3s; white-space: nowrap; overflow: hidden; }
.comp-bar-val { font-family: var(--mono); font-size: 11px; color: var(--muted); width: 60px; text-align: right; flex-shrink: 0; }
.no-data { color: var(--border2); font-family: var(--mono); font-size: 11px; }

/* SCROLL */
.scroll-wrap { overflow-x: auto; }
.scroll-wrap::-webkit-scrollbar { height: 4px; } 
.scroll-wrap::-webkit-scrollbar-track { background: var(--surface2); }
.scroll-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* PIE SVG */
.pie-legend { display: flex; flex-direction: column; gap: 6px; justify-content: center; }

/* BADGE colors by tipo */
.tag-out    { background: rgba(79,142,247,.15); color: #4f8ef7; }

.tag-support{ background: rgba(61,214,140,.15); color: #3dd68c; }

/* util */
.mb16 { margin-bottom: 16px; }
.mb24 { margin-bottom: 24px; }
.full { grid-column: 1 / -1; }
</style>

// ─── HELPERS ───────────────────────────────────────────────────────────────
function fmt(n){ if(n===null||n===undefined) return '<span class="dash-cell">—</span>';
  return n===0?'<span class="cell-0">0</span>':n.toLocaleString('es-ES'); }
function fmtN(n){ return n.toLocaleString('es-ES'); }
function pct(n,t){ return ((n/t)*100).toFixed(1)+'%'; }

function heatColor(v, max){
  if(v===null||v===0) return '';
  const ratio = v/max;
  const stops = [
    [0,   '#1e2026'],
    [0.1, '#1a2d4a'],
    [0.3, '#1a3d6e'],
    [0.6, '#1e5799'],
    [0.8, '#2c72c0'],
    [1.0, '#4f8ef7'],
  ];
  for(let i=1;i<stops.length;i++){
    if(ratio<=stops[i][0]){
      return `background:${stops[i][1]};`;
    }
  }
  return `background:${stops[stops.length-1][1]};`;
}

// ─── MOTIVOS ───────────────────────────────────────────────────────────────
function renderMotivos(){
  // Pie SVG
  const panelLeft = document.getElementById('panel-motivos');
  const R=70, cx=90, cy=90, total=MOTIVE_TOTAL;
  let startAngle = -Math.PI/2;
  let slices = '';
  MOTIVOS.forEach(m=>{
    const angle = (m.total/total)*2*Math.PI;
    const x1=cx+R*Math.cos(startAngle), y1=cy+R*Math.sin(startAngle);
    const x2=cx+R*Math.cos(startAngle+angle), y2=cy+R*Math.sin(startAngle+angle);
    const large=angle>Math.PI?1:0;
    slices+=`<path d="M${cx},${cy} L${x1.toFixed(1)},${y1.toFixed(1)} A${R},${R} 0 ${large},1 ${x2.toFixed(1)},${y2.toFixed(1)} Z" fill="${m.color}" opacity=".9"/>`;
    startAngle+=angle;
  });
  const legendItems = MOTIVOS.map(m=>`
    <div style="display:flex;align-items:center;gap:8px;">
      <span style="width:10px;height:10px;border-radius:2px;background:${m.color};flex-shrink:0;"></span>
      <span style="flex:1;font-size:12px;">${m.label}</span>
      <span style="font-family:var(--mono);font-size:11px;color:var(--muted);">${pct(m.total,MOTIVE_TOTAL)}</span>

        <circle cx="${cx}" cy="${cy}" r="32" fill="var(--surface)"/>

      </svg>
      <div style="flex:1;display:flex;flex-direction:column;gap:6px;">${legendItems}</div>
    </div>`;

  // Barras horizontales
  const panelRight = document.getElementById('panel-motivos-detail');
  const maxM = Math.max(...MOTIVOS.map(m=>m.total));
  const rows = MOTIVOS.map(m=>{
    const w = Math.round((m.total/maxM)*100);

      <span class="motivo-dot" style="background:${m.color}"></span>
      <span class="motivo-name">${m.label}</span>
      <div style="width:120px;height:4px;background:var(--border);border-radius:2px;flex-shrink:0;">

function renderRanking(){
  const sorted = [...CURATORS].sort((a,b)=>b.total-a.total);
  const colors = ['#f5a623','#9aa0af','#cd7f32'];
  const palette = ['#4f8ef7','#7c6af5','#e8529a','#f5a623','#2ec4b6','#3dd68c','#f04a4a','#9d8ef5','#52c4e8','#f5c842','#ff8c42','#c4f552','#e85252','#52e8c4','#e852c4','#c4e852','#5284e8','#e8a452','#84e852','#5252e8','#e88452'];

  // Pie chart
  const activeSorted = sorted.filter(c=>c.total>0);
  const totalAll = activeSorted.reduce((s,c)=>s+c.total,0);
  const R=80, cx=100, cy=100;
  let startAngle = -Math.PI/2;
  let slices = '';
  activeSorted.forEach((c,i)=>{
    const angle = (c.total/totalAll)*2*Math.PI;
    const x1=cx+R*Math.cos(startAngle), y1=cy+R*Math.sin(startAngle);
    const x2=cx+R*Math.cos(startAngle+angle), y2=cy+R*Math.sin(startAngle+angle);
    const large=angle>Math.PI?1:0;
    const color = palette[i%palette.length];
    slices+=`<path d="M${cx},${cy} L${x1.toFixed(1)},${y1.toFixed(1)} A${R},${R} 0 ${large},1 ${x2.toFixed(1)},${y2.toFixed(1)} Z" fill="${color}" opacity=".9"><title>${c.name}: ${fmtN(c.total)}</title></path>`;
    startAngle+=angle;
  });
  const legendItems = activeSorted.map((c,i)=>`
    <div style="display:flex;align-items:center;gap:7px;padding:3px 0;">
      <span style="width:8px;height:8px;border-radius:2px;background:${palette[i%palette.length]};flex-shrink:0;"></span>
      <span style="flex:1;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${c.name}</span>
      <span style="font-family:var(--mono);font-size:10px;color:var(--muted);">${pct(c.total,totalAll)}</span>
    </div>`).join('');
  document.getElementById('panel-ranking-pie').innerHTML = `
    <div class="panel-header"><span class="panel-title">Distribución por curador</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:12px;">
      <svg width="200" height="200" viewBox="0 0 200 200">${slices}
        <circle cx="${cx}" cy="${cy}" r="36" fill="var(--surface)"/>
        <text x="${cx}" y="${cy+4}" text-anchor="middle" fill="var(--muted)" font-size="10" font-family="var(--mono)">${fmtN(totalAll)}</text>
      </svg>
      <div style="width:100%;max-height:200px;overflow-y:auto;padding-right:4px;">${legendItems}</div>
    </div>`;

  // Ranking by total
  const makeRows = (arr, valKey, maxVal) => arr.map((c,i)=>{
    const w = Math.round((c[valKey]/maxVal)*100);
    const color = i<3?colors[i]:c.total>0?'#4f8ef7':'var(--border)';
    return `<div class="rank-item">
      <span class="rank-n">${i+1}</span>
      <span class="rank-name">${c.name}</span>
      <div class="rank-bar-wrap"><div class="rank-bar" style="width:${w}%;background:${color};"></div></div>
      <span class="rank-val">${fmtN(c[valKey])}</span>
    </div>`;
  }).join('');

  document.getElementById('panel-ranking').innerHTML =
    `<div class="panel-header"><span class="panel-title">Por total de reportes</span></div>`
    + makeRows(sorted,'total',MAX_CURATOR);
}

function renderComparador(){

  if(sortDir==='desc') data.sort((a,b)=>b.v-a.v);
  else data.sort((a,b)=>a.v-b.v);
  const maxV = data.length>0?Math.max(...data.map(x=>x.v)):1;
  const monthTotal = data.reduce((s,x)=>s+x.v,0);
  const palette = ['#4f8ef7','#7c6af5','#e8529a','#f5a623','#2ec4b6','#3dd68c','#f04a4a','#9d8ef5','#52c4e8','#f5c842','#ff8c42','#c4f552'];

    document.getElementById('comp-content').innerHTML = '<p style="color:var(--muted);font-size:12px;padding:8px 0;">Sin datos para este mes.</p>';
    return;
  }
  const bars = data.map((x,i)=>{
    const w = Math.round((x.v/maxV)*100);
    const color = palette[i%palette.length];

    return `<div class="comp-bar-row">
      <div class="comp-bar-name">${x.name}</div>
      <div class="comp-bar-track">

      </div>
      <div class="comp-bar-val">${w<=15?fmtN(x.v):''} <span style="color:var(--border2)">${share}%</span></div>
    </div>`;
  }).join('');
  // Total bar
  const totalBar = `<div class="comp-bar-row" style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);">
    <div class="comp-bar-name" style="color:var(--muted);font-size:11px;">TOTAL MES</div>

  document.getElementById('comp-content').innerHTML =
    `<div style="font-size:11px;color:var(--muted);font-family:var(--mono);margin-bottom:10px;">${MONTHS[mi]} 2025 — ${data.length} curadores activos</div>`
    + `<div class="comp-bars">${bars}${totalBar}</div>`;
}

function getCategory(tipo) {
  const t = tipo.toLowerCase();
  if (t.includes('out') || t.includes('support_ticket')) return 'Quality';
  if (t.includes('copyright') || t.includes('trademark') || t.includes('plagiarism')) return 'Copyright';
  if (t.includes('ethical')) return 'Sensitive';
  if (t.includes('invalid') || t.includes('error')) return 'Error files';
  if (t.includes('duplicate')) return 'Duplicate';
  return 'Other';
}

function renderResumen() {
  const from = parseInt(document.getElementById('res-from').value);
  const to   = parseInt(document.getElementById('res-to').value);
  if (to < from) { document.getElementById('res-to').value = from; return renderResumen(); }
  const year = getSelectedYear();
  const yearData = ALL_DATA[year];

  if (!yearData) {
    ['res-kpis','res-curator-panel','res-motivos-panel'].forEach(id => {
      const el = document.getElementById(id);
      if(el) el.innerHTML = `<div style="color:var(--muted);font-family:var(--mono);font-size:12px;padding:20px 0;text-align:center;">// sin datos para ${year}</div>`;
    });
    return;
  }

  const curatorFilter = document.getElementById('res-curator').value;
  let curators = yearData.curators;
  if (curatorFilter !== 'all') curators = curators.filter(c=>c.name===curatorFilter);

  // Totals per curator in selected month range
  const curatorTotals = curators.map(c => {
    let sum = 0;
    for(let i=from;i<=to;i++) sum += (c.d[i]||0);
    return {name:c.name, total:sum};
  }).filter(x=>x.total>0).sort((a,b)=>b.total-a.total);

  const grandTotal = curatorTotals.reduce((s,x)=>s+x.total,0);
  const rangeLabel = from===to ? MONTHS[from] : `${MONTHS[from]} – ${MONTHS[to]}`;

  const to   = parseInt(document.getElementById('res-to').value);
  const year = getSelectedYear();
  const yearData = ALL_DATA[year];
  if (!yearData) return;
  const rangeLabel = from===to ? MONTHS[from] : `${MONTHS[from]}-${MONTHS[to]}`;
  const curatorFilter = document.getElementById('res-curator').value;
  let curators = yearData.curators;
  if (curatorFilter !== 'all') curators = curators.filter(c=>c.name===curatorFilter);
  const curatorTotals = curators.map(c => {
    let sum = 0;
    for(let i=from;i<=to;i++) sum += (c.d[i]||0);
    return {name:c.name, total:sum};
  }).filter(x=>x.total>0).sort((a,b)=>b.total-a.total);
  const grandTotal = curatorTotals.reduce((s,x)=>s+x.total,0);
  let csv = `Año,Periodo,Curador,Total,%\n`;
  curatorTotals.forEach(c => {
    csv += `${year},"${rangeLabel}","${c.name}",${c.total},${((c.total/(grandTotal||1))*100).toFixed(1)}%\n`;
  });
  csv += `${year},"${rangeLabel}",TOTAL,${grandTotal},100%\n`;
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `resumen_${year}_${rangeLabel}.csv`;
  a.click(); URL.revokeObjectURL(url);
}

// ─── COMMENTS ──────────────────────────────────────────────────────────────
function renderComments(){
  const tipo = document.getElementById('sel-tipo').value;
  let data = tipo==='all' ? COMMENTS_RAW : COMMENTS_RAW.filter(c=>c.tipo===tipo);
  data = [...data].sort((a,b)=>b.n-a.n);
  const totalFiltered = data.reduce((s,r)=>s+r.n,0);
  const thead = `<thead><tr><th>#</th><th>Tipo</th><th>Comentario</th><th>Total</th><th>% del tipo</th></tr></thead>`;
  const tbody = data.map((r,i)=>{
    const tipoTotal = COMMENTS_RAW.filter(c=>c.tipo===r.tipo).reduce((s,x)=>s+x.n,0);
    const cls = TIPO_MAP[r.tipo]||'';
    const lbl = TIPO_LABEL[r.tipo]||r.tipo;
    return `<tr>
      <td style="font-family:var(--mono);font-size:11px;color:var(--muted);">${i+1}</td>
      <td><span class="tag ${cls}">${lbl}</span></td>
      <td>${r.comment}</td>
      <td style="font-family:var(--mono);font-weight:500;">${fmtN(r.n)}</td>
      <td style="font-family:var(--mono);color:var(--muted);">${pct(r.n,tipoTotal)}</td>
    </tr>`;
  }).join('');
  document.getElementById('comments-table').innerHTML = `${thead}<tbody>${tbody}</tbody>`;
}

// ─── TABS ──────────────────────────────────────────────────────────────────
function switchTab(year){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('page-'+year).classList.add('active');
}

// ─── INIT ──────────────────────────────────────────────────────────────────
renderKPIs();
renderMotivos();
renderRanking();
renderHeatmap();
initComparador();
renderComments();
initResumen();
</script>
